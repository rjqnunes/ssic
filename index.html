<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipamento SSIC</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    gap: 16px;
}
.card {
    background: white;
    border: 2.5px solid #1a338a;
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 360px;
    display: flex;
    gap: 18px;
    align-items: center;
}
.qr-wrap {
    width: 130px;
    height: 130px;
    flex-shrink: 0;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
}
.info { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 2px; }
.lbl {
    font-size: 9px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
.val {
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    word-break: break-all;
}
.header {
    text-align: center;
    font-size: 11px;
    color: #94a3b8;
    margin-bottom: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}
.btns {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 360px;
}
.btn {
    flex: 1;
    padding: 13px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    font-family: Arial, sans-serif;
    cursor: pointer;
}
.btn-guardar { background: #1a338a; color: white; }
.btn-partilhar { background: #25D366; color: white; }
</style>
</head>
<body>

<div style="width:100%;max-width:360px;">
    <div class="header">COMETLIS &bull; DSACF &bull; SSIC</div>
    <div class="card" id="etiqueta">
        <div class="qr-wrap" id="qr"></div>
        <div class="info">
            <div class="field"><span class="lbl">SSI</span><span class="val" id="v-s">-</span></div>
            <div class="field"><span class="lbl">N&ordm; S&eacute;rie</span><span class="val" id="v-sn">-</span></div>
            <div class="field"><span class="lbl">Nomenclatura</span><span class="val" id="v-n">-</span></div>
            <div class="field"><span class="lbl">IP</span><span class="val" id="v-ip">-</span></div>
        </div>
    </div>
</div>

<div class="btns">
    <button class="btn btn-guardar" onclick="guardarImagem()">&#128190; Guardar</button>
    <button class="btn btn-partilhar" onclick="partilharImagem()">&#8679; Partilhar</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var s  = params.get('s')  || '-';
    var sn = params.get('sn') || '-';
    var n  = params.get('n')  || '-';
    var ip = params.get('ip') || '-';

    document.getElementById('v-s').textContent  = s;
    document.getElementById('v-sn').textContent = sn;
    document.getElementById('v-n').textContent  = n;
    document.getElementById('v-ip').textContent = ip;

    window.addEventListener('load', function() {
        var wrap = document.getElementById('qr');
        var qr = new QRCode(document.createElement('div'), {
            text: window.location.href,
            width: 130,
            height: 130,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });
        var mat = qr._oQRCode;
        if (!mat) return;
        var cv = document.createElement('canvas');
        cv.width = 130;
        cv.height = 130;
        var ctx = cv.getContext('2d');
        var nm = mat.getModuleCount();
        var cell = Math.floor(130 / nm);
        var off  = Math.floor((130 - cell * nm) / 2);
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 130, 130);
        ctx.fillStyle = '#000';
        for (var r = 0; r < nm; r++) {
            for (var c = 0; c < nm; c++) {
                if (mat.isDark(r, c)) {
                    ctx.fillRect(off + c * cell, off + r * cell, cell, cell);
                }
            }
        }
        wrap.appendChild(cv);
    });
})();

async function gerarCanvas() {
    if (typeof html2canvas === 'undefined') {
        alert('A carregar, tenta novamente.');
        return null;
    }
    return await html2canvas(document.getElementById('etiqueta'), {
        scale: 3,
        backgroundColor: '#ffffff',
        useCORS: true
    });
}

async function guardarImagem() {
    var canvas = await gerarCanvas();
    if (!canvas) return;
    var s = new URLSearchParams(window.location.search).get('s') || 'eq';
    var link = document.createElement('a');
    link.download = 'etiqueta_SSI_' + s + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

async function partilharImagem() {
    var canvas = await gerarCanvas();
    if (!canvas) return;
    var s = new URLSearchParams(window.location.search).get('s') || 'eq';
    canvas.toBlob(async function(blob) {
        var file = new File([blob], 'etiqueta_SSI_' + s + '.png', { type: 'image/png' });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ title: 'Equipamento SSI ' + s, files: [file] });
            } catch(e) {
                window.open(URL.createObjectURL(blob), '_blank');
            }
        } else {
            window.open(URL.createObjectURL(blob), '_blank');
        }
    }, 'image/png');
}
</script>
</body>
</html>
